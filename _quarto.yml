bibliography: referencias.bib
csl: abnt.csl

filters:
  - danmackinlay/tikz
  - quarto

tikz:
  svg-engine: dvisvgm
  cache: true

format:
  html:
    theme: [cosmo, styles.css]
    toc: true
    toc-depth: 3
    toc-title: "Nesta página"
    number-sections: false
    code-copy: true
    fig-align: center
    link-external-newwindow: true
  pdf:
    documentclass: scrbook
    papersize: a4
    number-sections: false
    colorlinks: true
    fig-align: center
    include-in-header:
      text: |
        \usepackage{tikz}
        \usetikzlibrary{calc,angles,quotes,arrows.meta,positioning,intersections,decorations.pathreplacing,decorations.markings,patterns,through,backgrounds}
